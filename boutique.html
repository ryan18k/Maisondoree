<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maison Dorée</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--cream:#FAF7F2;--gold:#C8A96E;--gold-dark:#9A7A45;--brown:#3D2B1F;--text:#2C1F15;--text-muted:#8A7060;--white:#fff;--border:rgba(200,169,110,0.25)}
body{font-family:'Jost',sans-serif;background:var(--cream);color:var(--text)}
nav{display:flex;justify-content:space-between;align-items:center;padding:1.2rem 3rem;background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.nav-logo{font-family:'Cormorant Garamond',serif;font-size:1.5rem;color:var(--brown);text-decoration:none}
.nav-logo em{color:var(--gold);font-style:italic}
.nav-links{display:flex;gap:2rem;list-style:none}
.nav-links a{font-size:0.75rem;font-weight:500;letter-spacing:0.16em;text-transform:uppercase;color:var(--text-muted);text-decoration:none}
.nav-links a:hover{color:var(--gold)}
.notice{background:var(--brown);color:var(--gold);text-align:center;padding:3rem;font-family:'Cormorant Garamond',serif;font-size:1.5rem}
.notice em{font-style:italic}
.notice p{font-family:'Jost',sans-serif;font-size:0.85rem;color:rgba(255,255,255,0.5);margin-top:0.8rem}
.back-btn{display:inline-block;margin:2rem auto;padding:0.8rem 2rem;background:var(--brown);color:white;text-decoration:none;font-family:'Jost',sans-serif;font-size:0.78rem;letter-spacing:0.15em;text-transform:uppercase}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">Maison <em>Dorée</em></a>
  <ul class="nav-links">
    <li><a href="boutique.html">Boutique</a></li>
    <li><a href="contact.html">Contact</a></li>
    <li><a href="compte.html">Mon Compte</a></li>
  </ul>
</nav>
<div class="notice">
  <div>Page <em>boutique</em></div>
  <p>Colle ici le code HTML complet de cette page depuis le chat Claude.</p>
</div>
<div style="text-align:center"><a href="index.html" class="back-btn">← Retour à l'accueil</a></div>
</body>
</html>
